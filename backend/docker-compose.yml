# AgentHub Backend Standalone Docker Compose
#
# NOTE: For full-stack deployment (frontend + backend + optional databases),
# use the docker-compose.yml at the project root instead. This file is for
# backend-only deployments where you manage the frontend separately.
#
# See ../docker-compose.yml for full-stack deployment with profile support.
#
# Prerequisites:
# - Running PostgreSQL instance (if DATABASE_TYPE=postgres)
# - Running Qdrant instance (if VECTORSTORE_TYPE=qdrant)
# - Configure POSTGRES_HOST, POSTGRES_PORT, QDRANT_HOST, QDRANT_PORT in .env

services:
  backend:
    image: agenthub-backend
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agenthub-backend
    restart: unless-stopped
    volumes:
      # SQLite database persistence (harmless in PostgreSQL mode)
      - ./data:/app/data
    env_file:
      - .env
    environment:
      # Override for container environment
      HOST: 0.0.0.0
      PORT: 8080
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"