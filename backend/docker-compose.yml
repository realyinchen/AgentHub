# AgentHub Backend Standalone Docker Compose
#
# NOTE: For full-stack deployment (frontend + backend),
# use the docker-compose.yml at the project root instead. This file is for
# backend-only deployments where you manage the frontend separately.
#
# Prerequisites:
# - Running PostgreSQL instance (if DATABASE_TYPE=postgres)
# - Running Qdrant instance (if VECTORSTORE_TYPE=qdrant)
# - Configure POSTGRES_HOST, POSTGRES_PORT, QDRANT_HOST, QDRANT_PORT in .env

services:
  backend:
    image: agenthub-backend
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agenthub-backend
    restart: unless-stopped
    volumes:
      # SQLite database persistence (harmless in PostgreSQL mode)
      - ./data:/app/data
    env_file:
      - .env
    environment:
      # Override for container environment
      HOST: 0.0.0.0
      PORT: 8080
      # Override for Docker container: SQLite path inside volume
      SQLITE_DATABASE_PATH: /app/data/agenthub.db
      SQLITE_VEC_DATABASE_PATH: /app/data/agenthub_vec.db
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    extra_hosts:
      - "host.docker.internal:host-gateway"
