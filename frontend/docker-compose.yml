# AgentHub Frontend Docker Compose Configuration
# Standalone frontend deployment (requires running backend)
# Usage: cd frontend && docker-compose up -d
#
# Prerequisites:
# - Running backend service accessible at the specified host:port
# - Configure NGINX_BACKEND_HOST, NGINX_BACKEND_PORT in .env
#
# How it works:
# 1. Browser accesses frontend at http://localhost:5173
# 2. Browser makes API requests to /api/v1 (relative path, same origin)
# 3. Nginx proxies /api/ requests to the backend (NGINX_BACKEND_HOST:NGINX_BACKEND_PORT)
# 4. This avoids CORS issues since browser sees same-origin requests

services:
  frontend:
    image: agenthub-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Use relative path so browser sends API requests to same origin (nginx)
        # Nginx will proxy these to the actual backend
        VITE_API_BASE_URL: /api/v1
        # Backend address for nginx proxy (read from .env in this directory)
        NGINX_BACKEND_HOST: ${NGINX_BACKEND_HOST:-host.docker.internal}
        NGINX_BACKEND_PORT: ${NGINX_BACKEND_PORT:-8080}
    container_name: agenthub-frontend
    restart: unless-stopped
    environment:
      # Runtime environment variables for nginx config substitution
      NGINX_BACKEND_HOST: ${NGINX_BACKEND_HOST:-host.docker.internal}
      NGINX_BACKEND_PORT: ${NGINX_BACKEND_PORT:-8080}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
