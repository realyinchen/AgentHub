# AgentHub Frontend Standalone Docker Compose
#
# NOTE: For full-stack deployment (frontend + backend + optional databases),
# use the docker-compose.yml at the project root instead. This file is for
# frontend-only deployments where you manage the backend separately.
#
# See ../docker-compose.yml for full-stack deployment with profile support.
#
# Prerequisites:
# - Running AgentHub backend instance accessible on the network
# - Configure NGINX_BACKEND_HOST and NGINX_BACKEND_PORT accordingly

services:
  frontend:
    image: agenthub-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        NGINX_BACKEND_HOST: 127.0.0.1
        NGINX_BACKEND_PORT: 8080
    container_name: agenthub-frontend
    restart: unless-stopped
    environment:
      # Backend proxy configuration
      NGINX_BACKEND_HOST: ${NGINX_BACKEND_HOST:-127.0.0.1}
      NGINX_BACKEND_PORT: ${NGINX_BACKEND_PORT:-8080}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"