# AgentHub Backend Docker Compose Configuration
# Standalone backend deployment (requires external PostgreSQL and Qdrant)
# Usage: docker-compose -f docker-compose.backend.yml up -d
#
# Prerequisites:
# - Running PostgreSQL instance
# - Running Qdrant instance
# - Configure POSTGRES_HOST, POSTGRES_PORT, QDRANT_HOST, QDRANT_PORT in .env

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agenthub-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override for container environment
      HOST: 0.0.0.0
      PORT: 8080
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - agenthub-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  agenthub-network:
    driver: bridge