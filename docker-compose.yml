networks:
  agenthub-network:
    driver: bridge

services:
  backend:
    image: agenthub-backend
    container_name: agenthub-backend
    restart: unless-stopped
    networks:
      - agenthub-network
    volumes:
      - /app/agenthub/backend/data:/app/data
    env_file:
      - /app/agenthub/backend/.env  # Host machine absolute path
    environment:
      HOST: 0.0.0.0
      PORT: 8080
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 3s
      retries: 2
      start_period: 10s

  frontend:
    image: agenthub-frontend
    container_name: agenthub-frontend
    restart: unless-stopped
    networks:
      - agenthub-network
    env_file:
      - /app/agenthub/frontend/.env  # Host machine absolute path
    environment:
      NGINX_BACKEND_HOST: backend
      NGINX_BACKEND_PORT: 8080
    ports:
      - "80:80"
    depends_on:
      - backend
